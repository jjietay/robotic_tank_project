ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ttyUSB0         
    baudrate: 230400            # X3 Pro default
    lidar_type: 1
    device_type: 6
    sample_rate: 5
    abnormal_check_count: 4
    fixed_resolution: false
    reversion: false
    inverted: false
    auto_reconnect: true
    isSingleChannel: false
    intensity: false
    support_motor_dtr: false
    angle_min: -180.0
    angle_max: 180.0
    range_min: 0.1
    range_max: 12.0
    frequency: 10.0
    invalid_range_is_inf: false
    frame_id: lidar_link